<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT BEE — 클라이언트 자료실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600;0,700;0,800;0,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f2; --bg-alt:#eeede7; --panel:#ffffff; --ink:#131311; --ink-dim:#6f6d67;
    --line: rgba(19,19,17,0.12); --line-strong: rgba(19,19,17,0.3);
    --display:'Archivo', sans-serif; --body:'Inter', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg); color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none;}

  /* 직원용 화면과 완전히 다른, 손님 응대용 톤의 헤더 */
  header{
    padding:64px 24px 48px; text-align:center;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, var(--bg-alt), var(--bg));
    border-bottom:1px solid var(--line);
  }
  header img{height:44px; margin-bottom:22px;}
  header h1{font-family:var(--display); font-weight:900; font-size:clamp(24px,4vw,34px);}
  header p{margin-top:12px; font-family:var(--mono); font-size:12px; letter-spacing:0.05em; color:var(--ink-dim); text-transform:uppercase;}
  .exit-link{position:fixed; top:24px; right:24px; font-family:var(--mono); font-size:11px; color:var(--ink-dim); letter-spacing:0.04em;}

  main{max-width:920px; margin:0 auto; padding:48px 24px 100px;}
  .project-block{margin-bottom:56px;}
  .project-head{display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:20px; border-bottom:1px solid var(--line-strong); padding-bottom:14px;}
  .project-head h2{font-family:var(--display); font-weight:800; font-size:20px;}
  .project-head span{font-family:var(--mono); font-size:11px; color:var(--ink-dim);}

  .file-group{margin-bottom:22px;}
  .file-group-label{font-family:var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .file-group-label .dot{width:6px; height:6px; border-radius:50%;}
  .file-group-label.final .dot{background:#2f6b45;}
  .file-group-label.draft .dot{background:#9a6a12;}
  .file-card{border:1px solid var(--line); background:var(--panel);}
  .file-row{display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--line); font-size:13.5px;}
  .file-row:last-child{border-bottom:none;}
  .file-row .fname{display:flex; align-items:center; gap:10px; cursor:pointer;}
  .file-icon{width:26px; height:26px; border:1px solid var(--line-strong); border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:9px; color:var(--ink-dim);}
  .file-row a{font-family:var(--mono); font-size:11px; color:var(--ink-dim); border-bottom:1px solid var(--line-strong);}
  .file-row a:hover{color:var(--ink);}
  .empty-note{padding:20px 18px; font-family:var(--mono); font-size:12px; color:var(--ink-dim); border:1px dashed var(--line-strong);}

  .no-projects{text-align:center; padding:80px 20px; font-family:var(--mono); font-size:13px; color:var(--ink-dim);}

  .preview-overlay{
    position:fixed; inset:0; z-index:600; background:rgba(19,19,17,0.6);
    display:flex; align-items:center; justify-content:center; padding:30px;
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .preview-overlay.open{opacity:1; pointer-events:all;}
  .preview-box{width:min(800px,92vw); max-height:86vh; background:var(--panel); border-radius:4px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 30px 80px rgba(0,0,0,0.35);}
  .preview-head{display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:12px;}
  .preview-head button{background:none; border:none; font-size:16px; cursor:pointer; color:var(--ink-dim);}
  .preview-body{flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; background:var(--bg-alt); min-height:300px;}
  .preview-body img{max-width:100%; max-height:78vh;}
  .preview-body iframe{width:100%; height:78vh; border:none;}
  .preview-body p{font-family:var(--mono); font-size:12px; color:var(--ink-dim); padding:40px;}
</style>
</head>
<body>

<a href="login.html" class="exit-link" id="exitLink">로그아웃</a>

  <h1>클라이언트 자료실</h1>
  <p>Project Bee · Client Delivery</p>
</header>

<main id="main">
  <div class="no-projects">불러오는 중…</div>
</main>

<div class="preview-overlay" id="previewOverlay">
  <div class="preview-box">
    <div class="preview-head"><span id="previewName">파일 미리보기</span><button id="previewClose">✕</button></div>
    <div class="preview-body" id="previewBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  var SUPABASE_URL = 'https://dzgavufyqmhklywyyljx.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_vNvhBnzqzrC6VFY_ygL_XA_g4tL-P4B';
  var supabase = (SUPABASE_URL && SUPABASE_ANON_KEY)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;
  var CLIENT_BUCKET = 'client-files';

  // 게스트 로그인을 거치지 않고 주소를 직접 입력해 들어오는 것을 막습니다.
  if(sessionStorage.getItem('guestAccess') !== 'true'){
    window.location.href = 'login.html';
  }
  document.getElementById('exitLink').addEventListener('click', function(){
    sessionStorage.removeItem('guestAccess');
  });

  var IMAGE_EXT = ['jpg','jpeg','png','gif','webp'];
  async function openPreview(name, folder){
    var ext = (name.split('.').pop() || '').toLowerCase();
    var { data: signed } = await supabase.storage.from(CLIENT_BUCKET).createSignedUrl(folder + '/' + name, 120);
    var body = document.getElementById('previewBody');
    document.getElementById('previewName').textContent = name;
    if(!signed || !signed.signedUrl){ body.innerHTML = '<p>미리보기를 불러올 수 없습니다.</p>'; }
    else if(IMAGE_EXT.indexOf(ext) !== -1){ body.innerHTML = '<img src="'+signed.signedUrl+'">'; }
    else if(ext === 'pdf'){ body.innerHTML = '<iframe src="'+signed.signedUrl+'"></iframe>'; }
    else { body.innerHTML = '<p>이 파일 형식은 미리보기를 지원하지 않아요. 다운로드해서 확인해주세요.</p>'; }
    document.getElementById('previewOverlay').classList.add('open');
  }
  document.getElementById('previewClose').addEventListener('click', function(){
    document.getElementById('previewOverlay').classList.remove('open');
    document.getElementById('previewBody').innerHTML = '';
  });
  document.getElementById('previewOverlay').addEventListener('click', function(e){
    if(e.target === this){ this.classList.remove('open'); document.getElementById('previewBody').innerHTML = ''; }
  });

  async function renderFileGroup(folder){
    var { data } = await supabase.storage.from(CLIENT_BUCKET).list(folder);
    if(!data || !data.length) return null;
    var card = document.createElement('div');
    card.className = 'file-card';
    data.forEach(function(f){
      var ext = (f.name.split('.').pop() || 'FILE').toUpperCase().slice(0,4);
      var row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML =
        '<span class="fname" data-name="'+f.name+'"><span class="file-icon">'+ext+'</span>'+f.name+'</span>' +
        '<a href="#" class="dl-link" data-name="'+f.name+'">다운로드</a>';
      card.appendChild(row);
    });
    card.querySelectorAll('.fname').forEach(function(el){
      el.addEventListener('click', function(){ openPreview(this.getAttribute('data-name'), folder); });
    });
    card.querySelectorAll('.dl-link').forEach(function(a){
      a.addEventListener('click', async function(e){
        e.preventDefault();
        var { data: signed } = await supabase.storage.from(CLIENT_BUCKET).createSignedUrl(folder + '/' + this.getAttribute('data-name'), 60);
        if(signed && signed.signedUrl) window.open(signed.signedUrl, '_blank');
      });
    });
    return card;
  }

  async function loadPortal(){
    var main = document.getElementById('main');
    if(!supabase){
      main.innerHTML = '<div class="no-projects">서버 연결 후 자료가 표시됩니다.</div>';
      return;
    }
    var { data: projects } = await supabase.from('projects').select('*').order('created_at', { ascending:false });
    if(!projects || !projects.length){
      main.innerHTML = '<div class="no-projects">아직 공유된 자료가 없습니다.</div>';
      return;
    }
    main.innerHTML = '';
    var shownAny = false;
    for(var i = 0; i < projects.length; i++){
      var p = projects[i];
      var finalCard = await renderFileGroup(p.team + '/' + p.id + '/final');
      var draftCard = await renderFileGroup(p.team + '/' + p.id + '/draft');
      if(!finalCard && !draftCard) continue; // 공유된 파일이 없는 프로젝트는 목록에서 생략
      shownAny = true;

      var block = document.createElement('div');
      block.className = 'project-block';
      block.innerHTML = '<div class="project-head"><h2>'+p.name+'</h2><span>'+(p.client||'')+'</span></div>';
      if(finalCard){
        var fLabel = document.createElement('div');
        fLabel.className = 'file-group';
        fLabel.innerHTML = '<div class="file-group-label final"><span class="dot"></span>최종본</div>';
        fLabel.appendChild(finalCard);
        block.appendChild(fLabel);
      }
      if(draftCard){
        var dLabel = document.createElement('div');
        dLabel.className = 'file-group';
        dLabel.innerHTML = '<div class="file-group-label draft"><span class="dot"></span>초안</div>';
        dLabel.appendChild(draftCard);
        block.appendChild(dLabel);
      }
      main.appendChild(block);
    }
    if(!shownAny){
      main.innerHTML = '<div class="no-projects">아직 공유된 자료가 없습니다.</div>';
    }
  }

  loadPortal();
</script>

</body>
</html>
