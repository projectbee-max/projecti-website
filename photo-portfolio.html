<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography — PROJECT i</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600;0,700;0,800;0,900&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f2; --bg-alt:#eeede7; --ink:#131311; --ink-dim:#6f6d67;
    --line: rgba(19,19,17,0.12); --line-strong: rgba(19,19,17,0.3);
    --display:'Archivo', sans-serif; --body:'Inter', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html, body{-webkit-user-select:none; -moz-user-select:none; user-select:none;}
  img{-webkit-user-drag:none; user-drag:none; pointer-events:none;}

  .wm-badge{
    position:absolute !important; right:10px; bottom:10px; z-index:6;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .wm-badge img{width:20px; height:auto; opacity:0.9; display:block; pointer-events:none; filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6));}
  body{background:var(--bg); color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 32px;}
  @media (max-width:640px){.wrap{padding:0 20px;}}

  header{padding:34px 0 20px; border-bottom:1px solid var(--line);}
  .top-row{display:flex; align-items:center; justify-content:space-between;}
  .back{font-family:var(--mono); font-size:11.5px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-dim); display:flex; align-items:center; gap:8px; transition:color .2s;}
  .back:hover{color:var(--ink);}
  .brand img{height:28px;}

  .page-head{padding-top:70px; padding-bottom:50px;}
  .kicker{font-family:var(--mono); font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-dim); display:block; margin-bottom:18px;}
  h1{font-family:var(--display); font-weight:800; font-size:clamp(32px,5vw,54px); line-height:1.05;}
  .page-note{margin-top:20px; font-family:var(--body); color:var(--ink-dim); font-size:15.5px; max-width:560px; line-height:1.8;}

  .filter-row{display:flex; gap:10px; flex-wrap:wrap; margin:44px 0 4px; padding-bottom:36px;}
  .filter-row span{font-family:var(--mono); font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-dim); border:1px solid var(--line-strong); padding:8px 16px; border-radius:20px;}

  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:3px; background:var(--line); padding-bottom:100px;}
  @media (max-width:860px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:560px){.grid{grid-template-columns:1fr;}}
  .tile{aspect-ratio:4/5; position:relative; display:flex; align-items:flex-end; padding:20px; background-size:cover; background-position:center 22%; background-color:#c9c6bd;}
  .tile::after{content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.62), transparent 55%);}
  .tile .info{position:relative; z-index:2;}
  .tile .cat{font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:#e8e6df; display:block; margin-bottom:6px;}
  .tile .ttl{font-family:var(--display); font-weight:700; font-size:18px; color:#f5f5f2;}

  .g1{background:linear-gradient(155deg,#c9c6bd,#928e86 60%);}
  .g2{background:linear-gradient(155deg,#b8b5ac,#807c75 60%);}
  .g3{background:linear-gradient(155deg,#aeaba2,#767268 60%);}
  .g4{background:linear-gradient(155deg,#d0cdc4,#a09c93 60%);}
  .g5{background:linear-gradient(155deg,#c2bfb6,#8b877f 60%);}
  .g6{background:linear-gradient(155deg,#a29f96,#6f6b64 60%);}
  .g7{background:linear-gradient(155deg,#bcb9b0,#847f78 60%);}
  .g8{background:linear-gradient(155deg,#d4d1c8,#a5a199 60%);}
  .g9{background:linear-gradient(155deg,#98958c,#68655f 60%);}

  .tile{cursor:pointer;}
  .cover-badge{position:absolute; top:16px; right:16px; z-index:2; font-family:var(--mono); font-size:10.5px; letter-spacing:0.04em; color:#f5f5f2; background:rgba(19,19,17,0.4); padding:5px 10px; border-radius:20px;}

  /* ---------- layer 1: gallery grid overlay ---------- */
  .gallery-overlay{
    position:fixed; inset:0; z-index:400;
    background:rgba(19,19,17,0.5);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
    padding:40px;
  }
  .gallery-overlay.open{opacity:1; pointer-events:all;}
  .gallery-box{
    width:min(980px,92vw); max-height:86vh; overflow-y:auto;
    background:var(--bg); border-radius:4px; padding:40px;
    box-shadow:0 40px 100px rgba(0,0,0,0.35);
    transform:scale(0.97); transition:transform .3s ease;
  }
  .gallery-overlay.open .gallery-box{transform:scale(1);}
  .gallery-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:26px;}
  .gallery-head .gcat{font-family:var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-dim); display:block; margin-bottom:8px; font-weight:600;}
  .gallery-head .gtitle{font-family:var(--display); font-weight:800; font-size:26px;}
  .gallery-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  @media (max-width:640px){.gallery-grid{grid-template-columns:repeat(2,1fr);}}
  .gallery-thumb{aspect-ratio:4/5; border-radius:2px; cursor:pointer; transition:opacity .2s, transform .2s; background-size:cover; background-position:center 22%; background-color:#c9c6bd;}
  .gallery-thumb:hover{opacity:0.85; transform:scale(0.98);}

  /* ---------- layer 2: single photo overlay (stacks above gallery) ---------- */
  .single-overlay{
    position:fixed; inset:0; z-index:600;
    background:rgba(19,19,17,0.55);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
    padding:40px;
  }
  .single-overlay.open{opacity:1; pointer-events:all;}
  .single-box{
    width:min(760px,90vw); max-height:86vh; aspect-ratio:4/5; position:relative;
    border-radius:3px; overflow:hidden; box-shadow:0 40px 100px rgba(0,0,0,0.4);
    transform:scale(0.96); transition:transform .3s ease;
  }
  .single-overlay.open .single-box{transform:scale(1);}
  .single-box::after{content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.55), transparent 55%);}
  .single-caption{position:absolute; left:26px; bottom:24px; z-index:2;}
  .single-caption .lcat{font-family:var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:#e8e6df; display:block; margin-bottom:8px; font-weight:600;}
  .single-caption .ltitle{font-family:var(--display); font-weight:800; font-size:24px; color:#f7f6f2;}
  .single-counter{position:absolute; right:26px; bottom:24px; z-index:2; font-family:var(--mono); font-size:11.5px; color:#e8e6df; font-weight:600;}

  .overlay-close{
    position:absolute; top:28px; right:28px; z-index:601;
    width:44px; height:44px; border-radius:50%; border:1.5px solid rgba(19,19,17,0.3);
    background:var(--bg); color:var(--ink); font-family:var(--body); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .2s, color .2s;
  }
  .overlay-close:hover{background:var(--ink); color:var(--bg);}
  .nav-arrow{
    position:absolute; top:50%; transform:translateY(-50%); z-index:601;
    width:46px; height:46px; border-radius:50%; border:1.5px solid rgba(245,245,242,0.5);
    background:rgba(19,19,17,0.35); color:#f5f5f2; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .2s;
  }
  .nav-arrow:hover{background:rgba(19,19,17,0.6);}
  .nav-prev{left:14px;} .nav-next{right:14px;}

  footer{border-top:1px solid var(--line); padding:30px 0; font-family:var(--mono); font-size:11px; color:var(--ink-dim); text-align:center;}

  /* ---------- typography boost ---------- */
  body{font-weight:500;}
  .back{font-weight:600; font-size:12.5px;}
  .kicker{font-weight:600; font-size:12.5px;}
  h1{font-size:clamp(36px,5.6vw,60px); font-weight:800;}
  .page-note{font-size:16.5px; font-weight:500;}
  .filter-row span{font-weight:600;}
  .tile .cat{font-weight:600;}
  .tile .ttl{font-weight:800; font-size:19px;}
  footer{font-weight:500; font-size:12px;}

  /* ---------- mobile refinements ---------- */
  @media (max-width:640px){
    header{padding:24px 0 16px;}
    .brand img{height:22px;}
    .page-head{padding-top:44px; padding-bottom:34px;}
    h1{font-size:clamp(28px,9vw,40px);}
    .page-note{font-size:15px;}
    .filter-row{margin:28px 0 4px; padding-bottom:24px; gap:8px;}
    .filter-row span{font-size:10px; padding:6px 12px;}
    .grid{padding-bottom:60px;}
    .tile .ttl{font-size:16px;}

    .gallery-overlay, .single-overlay{padding:16px;}
    .gallery-box{padding:24px 18px; max-height:88vh;}
    .gallery-head .gtitle{font-size:20px;}
    .gallery-grid{gap:6px;}
    .single-box{max-height:70vh;}
    .single-caption .ltitle{font-size:19px;}
    .overlay-close{width:38px; height:38px; font-size:15px; top:16px; right:16px;}
    .nav-arrow{width:38px; height:38px; font-size:16px;}
    .nav-prev{left:6px;} .nav-next{right:6px;}
  }
</style>
</head>

<script>
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('dragstart', function(e){ e.preventDefault(); });

  /* =========================================================
     새 프로젝트를 추가하려면 아래 목록에 폴더명 한 줄만 추가하세요.
     예) '7. snap_서효권' 폴더를 만들고 사진을 1.jpg, 2.jpg... 순서로 넣은 뒤,
         아래 배열 맨 끝에 '7. snap_서효권' 한 줄만 추가하면 끝입니다.
     - 목록에 적힌 순서 = 사이트에 보여지는 순서
     - 폴더 안 사진 개수 = 자동으로 감지 (1.jpg부터 순서대로 있는 만큼)
     - 사진 1번이 항상 커버(대표 이미지)가 됩니다
     - 폴더명 형식: "번호. 카테고리_이름" (예: "7. snap_서효권")
     ========================================================= */
  var PROJECT_FOLDERS = [
    '1. snap_김가영',
    '2. f1 concept_임채원',
    '3. lifestyle_하방',
    '4. profile_문우주',
    '5. profile_김하윤',
    '6. snap_채다빈'
  ];
  var PHOTO_BASE = 'images/photo/';
  var MAX_PHOTOS_PER_FOLDER = 25;

  /* 특정 사진만 크롭 기준점을 다르게 주고 싶을 때 여기에 한 줄씩 추가하세요.
     기본값은 'center 22%' (얼굴이 잘리지 않도록 살짝 위쪽 기준)이고,
     특정 사진이 여전히 이상하게 잘리면 경로를 적고 원하는 위치를 지정하면 됩니다.
     값은 'center top' / 'center 10%' / '50% 15%' 처럼 CSS background-position 형식입니다. */
  var CROP_OVERRIDES = {
    // 'images/photo/2. f1 concept_임채원/1.jpg': 'center 10%',
  };
  function cropFor(path){
    return CROP_OVERRIDES[path] || 'center 22%';
  }

  function parseFolder(folder){
    var rest = folder.replace(/^\s*\d+\.\s*/, '');
    var parts = rest.split('_');
    var catRaw = parts[0].trim();
    var name = parts.length > 1 ? parts.slice(1).join('_').trim() : '';
    var cat = catRaw.replace(/\b\w/g, function(c){ return c.toUpperCase(); });
    return {cat: cat, title: name || cat};
  }

  // 실제 파일이 .JPG(대문자)라서 이 순서로 먼저 시도합니다. 폴더마다 1번 사진에서
  // 딱 한 번만 확장자를 확인하고, 나머지 사진들은 같은 확장자로 한꺼번에(병렬로) 확인해서
  // 사진 수가 많아도 순서대로 기다리지 않고 훨씬 빠르게 로딩됩니다.
  var EXTENSIONS = ['JPG', 'jpg', 'jpeg', 'JPEG', 'png', 'PNG'];

  function photoPath(folder, n, ext){
    return PHOTO_BASE + encodeURIComponent(folder) + '/' + n + '.' + ext;
  }

  function tryLoadPhoto(folder, n, extIndex, onFound, onNotFound){
    if(extIndex >= EXTENSIONS.length){ onNotFound(); return; }
    var ext = EXTENSIONS[extIndex];
    var path = photoPath(folder, n, ext);
    var img = new Image();
    img.onload = function(){ onFound(path, ext); };
    img.onerror = function(){ tryLoadPhoto(folder, n, extIndex + 1, onFound, onNotFound); };
    img.src = path;
  }

  function countPhotos(folder, cb){
    // 1번 사진으로 이 폴더의 실제 확장자를 먼저 확인
    tryLoadPhoto(folder, 1, 0, function(firstPath, ext){
      var results = [firstPath];
      var total = MAX_PHOTOS_PER_FOLDER - 1;
      if(total <= 0){ cb(results); return; }
      var remaining = total;
      var settled = new Array(MAX_PHOTOS_PER_FOLDER + 1);

      for(var n = 2; n <= MAX_PHOTOS_PER_FOLDER; n++){
        (function(n){
          var img = new Image();
          var path = photoPath(folder, n, ext);
          img.onload = function(){ settled[n] = path; check(); };
          img.onerror = function(){ settled[n] = null; check(); };
          img.src = path;
        })(n);
      }

      function check(){
        remaining--;
        if(remaining > 0) return;
        // 모두 응답 완료 → 1번부터 순서대로 끊기지 않고 이어지는 만큼만 채택
        for(var i = 2; i <= MAX_PHOTOS_PER_FOLDER; i++){
          if(settled[i]) results.push(settled[i]);
          else break;
        }
        cb(results);
      }
    }, function(){
      cb([]); // 1번 사진조차 없으면 빈 폴더로 처리
    });
  }

  function nextImg(e){ if(e) e.stopPropagation(); currentIndex = (currentIndex+1) % currentImages.length; renderSingle(); }
  function prevImg(e){ if(e) e.stopPropagation(); currentIndex = (currentIndex-1+currentImages.length) % currentImages.length; renderSingle(); }

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
      if(document.getElementById('singleOverlay').classList.contains('open')) closeSingle();
      else closeGallery();
    }
    if(document.getElementById('singleOverlay').classList.contains('open')){
      if(e.key === 'ArrowRight') nextImg();
      if(e.key === 'ArrowLeft') prevImg();
    }
  });
