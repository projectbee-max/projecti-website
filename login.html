<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT BEE — 사내 워크스페이스 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600;0,700;0,800;0,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f2; --bg-alt:#eeede7; --ink:#131311; --ink-dim:#6f6d67;
    --line: rgba(19,19,17,0.12); --line-strong: rgba(19,19,17,0.3);
    --display:'Archivo', sans-serif; --body:'Inter', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg); color:var(--ink); font-family:var(--body); min-height:100svh; display:flex; align-items:center; justify-content:center; -webkit-font-smoothing:antialiased; padding:24px;}
  a{color:inherit; text-decoration:none;}

  .back{position:fixed; top:28px; left:28px; font-family:var(--mono); font-size:11.5px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-dim); display:flex; align-items:center; gap:8px; transition:color .2s;}
  .back:hover{color:var(--ink);}

  .card{width:100%; max-width:400px; text-align:center;}
  .bracket{position:relative; display:inline-block; margin-bottom:8px;}
  .bracket::before{
    content:''; position:absolute; top:-12px; left:-20px; bottom:-12px; width:14px;
    border-top:1.5px solid var(--ink); border-left:1.5px solid var(--ink); border-bottom:1.5px solid var(--ink); opacity:0.85;
  }
  .wordmark{display:flex; align-items:center; justify-content:center;}
  .wordmark img{height:52px; width:auto; display:block;}
  .subline{margin-top:18px; font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-dim);}

  form{margin-top:48px; text-align:left;}
  .field{margin-bottom:22px;}
  .field label{display:block; font-family:var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:10px;}
  .field input{
    width:100%; background:transparent; border:none; border-bottom:1px solid var(--line-strong);
    color:var(--ink); font-family:var(--body); font-size:15px; padding:10px 2px; outline:none; transition:border-color .2s;
  }
  .field input:focus{border-color:var(--ink);}

  .submit-btn{
    margin-top:12px; width:100%; background:var(--ink); color:var(--bg);
    font-family:var(--mono); font-size:13px; letter-spacing:0.05em; text-transform:uppercase;
    padding:16px; border:none; border-radius:1px; cursor:pointer; transition:opacity .2s;
  }
  .submit-btn:hover{opacity:0.85;}
  .login-error{margin-top:14px; font-family:var(--mono); font-size:11.5px; color:#b3432f;}

  .workspace-hint{margin-top:20px; font-family:var(--mono); font-size:11px; color:var(--ink-dim); text-align:center; line-height:1.7;}
  .workspace-hint b{color:var(--ink); font-weight:600;}

  .divider-line{margin:36px 0; border-top:1px solid var(--line);}
  .brand-note{font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); line-height:1.8;}
  .brand-note .row{display:flex; justify-content:space-between; padding:4px 0;}

  .proto-badge{
    margin-top:28px; display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:0.04em;
    color:var(--ink-dim); border:1px solid var(--line-strong); padding:6px 12px; border-radius:20px;
  }

  @media (max-width:480px){
    body{padding:20px 20px 80px;}
    .back{position:static; margin-bottom:32px; display:inline-flex;}
    .card{max-width:100%;}
    .wordmark img{height:42px;}
    form{margin-top:36px;}
    .field{margin-bottom:18px;}
    .submit-btn{padding:15px;}
    .proto-badge{font-size:9.5px; padding:6px 10px; text-align:left; white-space:normal;}
  }
</style>
</head>
<body>

  <p class="subline">사내 워크스페이스 로그인</p>

  <form id="loginForm">
    <div class="field">
      <label for="email">이메일 / 아이디</label>
      <input id="email" type="text" placeholder="name@projectbee.kr" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="submit-btn">로그인</button>
    <p id="loginError" class="login-error" hidden></p>
  </form>
  <p class="workspace-hint">클라이언트이신가요? 담당자에게 안내받은 계정으로 로그인해주세요.</p>

  <div class="divider-line"></div>
  <div class="brand-note">
    <div class="row"><span>OPERATED BY</span><span>PROJECT BEE</span></div>
    <div class="row"><span>TEAMS</span><span>PROJECT i · PROJECT BEE</span></div>
  </div>

  <span class="proto-badge">⚠ 로그인 전용 연결입니다 — 프로젝트·파일 데이터는 별도 연결 예정</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  /* =========================================================
     SUPABASE 연결 지점 — 로그인(인증) 전용
     Supabase 프로젝트를 만드신 뒤, Project Settings → API에서
     URL과 anon public key를 복사해서 아래 두 줄에 넣으세요.
     이 두 줄만 채우면 실제 로그인이 바로 작동합니다.
     (프로젝트/파일 같은 "데이터"는 이것과 별개로 나중에 연결하면 됩니다)
     ========================================================= */
  var SUPABASE_URL = 'https://dzgavufyqmhklywyyljx.supabase.co';      // 예: 'https://xxxxxxxx.supabase.co'
  var SUPABASE_ANON_KEY = 'sb_publishable_vNvhBnzqzrC6VFY_ygL_XA_g4tL-P4B'; // 예: 'eyJhbGciOi...' (anon public key)

  var supabase = (SUPABASE_URL && SUPABASE_ANON_KEY)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var errorEl = document.getElementById('loginError');
    errorEl.hidden = true;

    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;

    // 클라이언트 게스트 로그인 — 담당자에게 공유된 공용 계정입니다.
    // 정식 계정별 로그인이 필요해지면 이 부분을 Supabase 계정 기반으로 교체하면 됩니다.
    if(email.trim().toLowerCase() === 'guest' && password === 'guest1234'){
      sessionStorage.setItem('guestAccess', 'true');
      window.location.href = 'client-portal.html';
      return;
    }

    if(!supabase){
      // Supabase가 아직 연결되지 않은 상태 → 화면 흐름 확인용으로 바로 이동
      window.location.href = 'dashboard.html?team=i';
      return;
    }

    // 1) 실제 계정 인증
    var { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });
    if(error){
      errorEl.textContent = '이메일 또는 비밀번호를 확인해주세요.';
      errorEl.hidden = false;
      return;
    }

    // 2) 소속 팀 조회 (profiles 테이블에 team 컬럼이 있다고 가정)
    //    테이블이 아직 없다면 아래 쿼리는 실패하고 기본값 'i'로 이동합니다.
    var team = 'i';
    try{
      var { data: profile } = await supabase
        .from('profiles')
        .select('team')
        .eq('id', data.user.id)
        .single();
      if(profile && profile.team) team = profile.team;
    }catch(_e){ /* profiles 테이블 준비 전이면 기본값 사용 */ }

    window.location.href = 'dashboard.html?team=' + team;
  });
</script>

</body>
</html>
